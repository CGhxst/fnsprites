<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track, manage, and share your Fortnite Sprites collection and mastery progress.">
    <title>Fortnite Sprites Tracker</title>
    <link rel="icon" type="image/png" href="siteimages/staticsprite.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="sprites-data.js" defer></script>
    <script type="module" src="app.js"></script>
</head>
<body>

<div class="banner" id="viewBanner" hidden>
    <span>Viewing a shared collection - showing collected sprites only.</span>
    <a href="index.html">Go to my tracker</a>
</div>

<div class="app">
    <header class="header">
        <div class="brand">
            <img src="siteimages/staticsprite.png" alt="" class="brand-icon" width="36" height="36">
            <h1>Sprites Tracker</h1>
        </div>
        <div class="progress-group">
            <div class="progress-item">
                <div class="progress-meta">
                    <span class="progress-label">Collection</span>
                    <span class="progress-value" id="collectionRatio">0 / 0</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="collectionFill"></div></div>
            </div>
            <div class="progress-item">
                <div class="progress-meta">
                    <span class="progress-label">Mastery</span>
                    <span class="progress-value" id="masteryRatio">0 / 0</span>
                </div>
                <div class="progress-track"><div class="progress-fill mastery" id="masteryFill"></div></div>
            </div>
        </div>
    </header>

    <nav class="toolbar">
        <div class="toolbar-row">
            <input type="search" id="searchInput" class="input" placeholder="Search sprites…" autocomplete="off" spellcheck="false">
            <select id="themeFilter" class="select">
                <option value="all">All themes</option>
                <option value="Basic">Basic</option>
                <option value="Gold">Gold</option>
                <option value="Candy">Gummy</option>
                <option value="Galaxy">Galaxy</option>
                <option value="Gem">Gem</option>
                <option value="Holofoil">Holofoil</option>
                <option value="Rift">Rift</option>
            </select>
            <select id="sortOrder" class="select">
                <option value="theme">Group by theme</option>
                <option value="sprite">Group by sprite</option>
                <option value="name">Alphabetical (A-Z)</option>
                <option value="rarity">Sort by rarity</option>
            </select>
            <div class="pills" id="statusPills">
                <button class="pill active" data-status="all">All</button>
                <button class="pill" data-status="owned">Owned</button>
                <button class="pill" data-status="missing">Missing</button>
            </div>
        </div>
        <div class="toolbar-row">
            <div class="switches">
                <label class="switch"><input type="checkbox" id="hideMastered"><span>Hide mastered</span></label>
                <label class="switch"><input type="checkbox" id="showUnreleased"><span>Unreleased</span></label>
                <label class="switch"><input type="checkbox" id="lowFidelity"><span>Low fidelity</span></label>
            </div>
            <div class="actions">
                <div class="dropdown" id="exportDropdown">
                    <button class="btn" id="exportToggle">Export</button>
                    <div class="dropdown-menu">
                        <button data-export="collected"><span class="dot" style="background:var(--collected)"></span>Collection image</button>
                        <button data-export="missing"><span class="dot" style="background:var(--missing)"></span>Missing sprites</button>
                        <button data-export="unmastered"><span class="dot" style="background:var(--unmastered)"></span>Unmastered sprites</button>
                        <button data-export="mastered"><span class="dot" style="background:var(--mastered)"></span>Mastered sprites</button>
                        <button data-export="trade"><span class="dot" style="background:linear-gradient(135deg, #ffd700, #22c55e)"></span>Trade card image</button>
                        <hr class="dropdown-divider">
                        <button id="exportBackupBtn"><span class="dot" style="background:#555"></span>Backup data (JSON)</button>
                    </div>
                </div>
                <button class="btn" id="importBtn">Import</button>
                <input type="file" id="importInput" accept=".json" style="display: none">
                <div class="dropdown" id="copyDropdown">
                    <button class="btn" id="copyToggle">Copy trade list</button>
                    <div class="dropdown-menu">
                        <button id="copyTradeTextBtn"><span class="dot" style="background:#8891a5"></span>Trade list (text)</button>
                        <button id="copyTradeGridBtn"><span class="dot" style="background:#555"></span>Trade grid (text)</button>
                    </div>
                </div>
                <button class="btn btn-accent" id="shareBtn">Share</button>
            </div>
        </div>
    </nav>

    <main class="grid" id="spriteGrid"></main>
</div>

</body>
</html>
